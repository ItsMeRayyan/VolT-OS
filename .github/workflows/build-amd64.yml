name: VolT OS AMD64 (Debian)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug repo (IMPORTANT)
        run: |
          echo "=== FILE TREE ==="
          find . -type f | sort

      - name: Ensure build.sh exists
        run: |
          if [ ! -f "./build.sh" ]; then
            echo "ERROR: build.sh NOT FOUND in root!"
            echo "Searching for it..."
            find . -name "build.sh"
            exit 1
          fi

      - name: Make build.sh executable
        run: chmod +x ./build.sh

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            git \
            curl \
            wget \
            xz-utils \
            file

      - name: Run build
        run: |
          ./build.sh amd64
