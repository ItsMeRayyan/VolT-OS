name: VolT OS AMD64 (Debian Stable)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: |
          echo "===== FILE TREE ====="
          find . -type f | sort

      - name: Install full build toolchain (fixes exit 127)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            git \
            curl \
            wget \
            xz-utils \
            file \
            make \
            gcc \
            g++ \
            cmake \
            ninja-build \
            python3 \
            bash

      - name: Verify config.sh exists
        run: |
          if [ ! -f "./build/amd64/auto/config.sh" ]; then
            echo "ERROR: config.sh not found at expected path"
            find . -name "config.sh"
            exit 1
          fi

      - name: Make config executable
        run: chmod +x ./build/amd64/auto/config.sh

      - name: Run config (amd64)
        run: |
          cd ./build/amd64/auto
          ./config.sh amd64

      - name: Show PATH + sanity check (debug)
        run: |
          echo "PATH: $PATH"
          which make || echo "make missing"
          which gcc || echo "gcc missing"
          which python3 || echo "python3 missing"
