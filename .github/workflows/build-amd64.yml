name: VolT OS AMD64 (Debian Stable)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository structure
        run: |
          echo "===== ROOT FILES ====="
          ls -la
          echo "===== FULL TREE ====="
          find . -maxdepth 4

      - name: Update apt safely
        run: |
          set -e
          apt-get update -o Acquire::Retries=5
          apt-get install -y --no-install-recommends ca-certificates

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            git \
            curl \
            wget \
            xz-utils \
            file \
            make \
            gcc \
            g++ \
            python3 \
            cmake \
            ninja-build

      - name: Make build script executable (if exists)
        run: |
          find . -name "build.sh" -exec chmod +x {} \;

      - name: Build VolT OS (auto-detect)
        run: |
          set -e

          echo "Searching for build system..."

          if [ -f ./build.sh ]; then
            echo "Found build.sh in root"
            ./build.sh amd64

          elif [ -f ./Makefile ]; then
            echo "Found Makefile in root"
            make amd64 || make

          elif [ -f ./build/build.sh ]; then
            echo "Found build.sh in build/"
            chmod +x ./build/build.sh
            ./build/build.sh amd64

          elif [ -f ./src/build.sh ]; then
            echo "Found build.sh in src/"
            chmod +x ./src/build.sh
            ./src/build.sh amd64

          else
            echo "❌ No build system found"
            echo "Directory structure:"
            find .
            exit 1
          fi

      - name: Upload build artifacts (if any)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: volt-os-amd64
          path: |
            build/
            out/
            dist/
