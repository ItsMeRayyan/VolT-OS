name: VolT OS AMD64 Build (Debian)

on:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update apt safely (fix repo issues)
        run: |
          set -e
          rm -rf /var/lib/apt/lists/*
          apt-get clean

          apt-get update -o Acquire::Retries=5 -o Acquire::http::Timeout=15 || {
            echo "Retrying apt update with safer mirrors..."
            sed -i 's/deb.debian.org/ftp.debian.org/g' /etc/apt/sources.list
            apt-get update -o Acquire::Retries=5 -o Acquire::http::Timeout=15
          }

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential \
            git \
            ca-certificates \
            curl \
            wget \
            xz-utils \
            file

      - name: Verify environment
        run: |
          uname -a
          gcc --version
          make --version

      - name: Build VolT OS (amd64)
        run: |
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh amd64
          elif [ -f Makefile ]; then
            make amd64
          else
            echo "No build script found"
            exit 1
          fi
