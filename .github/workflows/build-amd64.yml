name: VolT OS AMD64 ISO Build

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      TMPDIR: /tmp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure
        run: find . -type f | sort

      - name: Install Live Build dependencies (HOST MODE)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            build-essential \
            git \
            curl \
            wget \
            xz-utils \
            ca-certificates \
            gnupg

      - name: Fix certificates
        run: sudo update-ca-certificates || true

      - name: Verify config exists
        run: |
          test -f ./build/amd64/auto/config.sh

      - name: Make config executable
        run: chmod +x ./build/amd64/auto/config.sh

      - name: Clean previous build
        run: |
          cd ./build/amd64/auto
          lb clean --purge || true
          rm -rf chroot binary cache || true

      - name: Run config.sh
        run: |
          cd ./build/amd64/auto
          bash -x ./config.sh amd64

      - name: Run Live Build
        run: |
          cd ./build/amd64/auto
          sudo lb build

      - name: Find ISO
        run: find . -type f -name "*.iso" || true

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: volt-os-amd64-iso
          path: "**/*.iso"
