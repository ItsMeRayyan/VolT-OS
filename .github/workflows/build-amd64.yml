name: VolT OS AMD64 ISO Build

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    env:
      DEBIAN_FRONTEND: noninteractive
      TMPDIR: /tmp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "===== FILE TREE ====="
          find . -type f | sort

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            coreutils \
            findutils \
            grep \
            sed \
            gawk \
            file \
            build-essential \
            git \
            curl \
            wget \
            xz-utils \
            squashfs-tools \
            xorriso \
            live-build \
            debootstrap \
            ca-certificates \
            gnupg \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools

      - name: Fix certificates
        run: update-ca-certificates || true

      - name: Verify config.sh exists
        run: |
          if [ ! -f "./build/amd64/auto/config.sh" ]; then
            echo "ERROR: config.sh not found"
            find . -name "config.sh"
            exit 1
          fi

      - name: Prepare build directory cleanup
        run: |
          cd ./build/amd64/auto
          lb clean --purge || true
          rm -rf chroot binary cache || true

      - name: Make config executable
        run: chmod +x ./build/amd64/auto/config.sh

      - name: Run config.sh (trace mode)
        run: |
          cd ./build/amd64/auto
          bash -x ./config.sh amd64

      - name: Run Live Build (ISO generation)
        run: |
          cd ./build/amd64/auto
          lb build || (echo "Live build failed" && exit 32)

      - name: Locate ISO output
        run: |
          echo "===== SEARCHING FOR ISO ====="
          find . -type f -name "*.iso" || true

      - name: Copy ISO artifact
        run: |
          ISO_FILE=$(find . -type f -name "*.iso" | head -n 1 || true)

          if [ -n "$ISO_FILE" ]; then
            echo "Found ISO: $ISO_FILE"
            cp "$ISO_FILE" ./VolT-OS-amd64.iso
          else
            echo "ERROR: No ISO generated"
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: volt-os-amd64-iso
          path: VolT-OS-amd64.iso
