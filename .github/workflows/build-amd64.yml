name: VolT OS AMD64 (Debian Live Build)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: |
          echo "===== FILE TREE ====="
          find . -type f | sort

      - name: Install full build environment
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            coreutils \
            findutils \
            grep \
            sed \
            gawk \
            file \
            build-essential \
            git \
            curl \
            wget \
            xz-utils \
            squashfs-tools \
            xorriso \
            live-build \
            debootstrap \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools

      - name: Verify config.sh exists
        run: |
          if [ ! -f "./build/amd64/auto/config.sh" ]; then
            echo "ERROR: config.sh not found"
            find . -name "config.sh"
            exit 1
          fi

      - name: Make config executable
        run: chmod +x ./build/amd64/auto/config.sh

      - name: Run build config (amd64)
        run: |
          cd ./build/amd64/auto
          bash -x ./config.sh amd64

      - name: Final sanity check
        run: |
          echo "PATH: $PATH"
          which lb || echo "lb still missing (should not happen)"
          lb --version || true
