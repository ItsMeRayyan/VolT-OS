name: VolT OS AMD64

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug file structure
        run: |
          echo "=== FULL FILE TREE ==="
          find . -type f | sort

      - name: Verify config exists
        run: |
          if [ ! -f "./build/amd64/auto/config.sh" ]; then
            echo "ERROR: config.sh not found!"
            exit 1
          fi

      - name: Make config executable
        run: chmod +x ./build/amd64/auto/config.sh

      - name: Run config (amd64)
        run: |
          ./build/amd64/auto/config.sh amd64

      - name: Install build tools (if config expects them)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            git \
            curl \
            wget \
            xz-utils \
            file
