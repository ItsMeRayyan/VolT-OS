name: Build VolT OS AMD64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y live-build debootstrap squashfs-tools xorriso

      - name: Clean
        run: sudo lb clean --purge || true

      - name: Configure
        run: |
          lb config \
            --distribution trixie \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --archive-areas "main contrib non-free non-free-firmware"

      - name: Build ISO
        run: sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: volt-os-amd64
          path: "*.iso"
