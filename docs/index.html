<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VolT OS</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <h1>VolT OS</h1>
    <p class="subtitle">A Debian-based gaming OS built for speed and simplicity.</p>

    <div class="buttons">
        <a class="btn" href="#">Downloads</a>
        <a class="btn" href="#">Wiki (Coming Soon)</a>
    </div>
</header>

<main>

<section>
    <h2>Features</h2>

    <div class="grid">

        <div class="card">
            <i class="fa-solid fa-gamepad"></i>
            <h3>Gaming First</h3>
            <p>Optimized for Steam, Proton, and Wine.</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-bolt"></i>
            <h3>Lightweight</h3>
            <p>No bloat. Clean Debian base.</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-box"></i>
            <h3>AppImage Ready</h3>
            <p>Double-click apps instantly.</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-microchip"></i>
            <h3>Cross Platform</h3>
            <p>AMD64 + ARM support planned.</p>
        </div>

    </div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
